name: simplekv-ci

on:
  push:
    branches: ["main", "master"]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  jvm-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ["25"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Configure Maven toolchain
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/toolchains.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>25</version>
              </provides>
              <configuration>
                <jdkHome>${JAVA_HOME}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          EOF

      - name: Build all modules
        run: mvn -B -ntp clean verify -Djacoco.skip=true

      - name: Check code quality
        run: mvn -B -ntp install spotbugs:check

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-jvm
          path: |
            */target/surefire-reports/
            */target/failsafe-reports/

  native-build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "25"
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: true

      - name: Configure Maven toolchain
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/toolchains.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>25</version>
              </provides>
              <configuration>
                <jdkHome>${JAVA_HOME}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          EOF

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: native-${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            native-${{ runner.os }}-maven-

      - name: Build native executables
        run: mvn -B -ntp -pl simplekv-app -am -Pnative package -DskipTests
        env:
          MAVEN_OPTS: -Xmx2g

      - name: Verify executables exist
        shell: pwsh
        run: |
          if (Test-Path "simplekv-app/target/simplekv-cli.exe") {
            Write-Host "OK: simplekv-cli.exe found"
            Get-Item "simplekv-app/target/simplekv-cli.exe" | Select-Object Length
          } else {
            Write-Host "ERROR: simplekv-cli.exe NOT found"
            exit 1
          }
          if (Test-Path "simplekv-app/target/simplekv-server.exe") {
            Write-Host "OK: simplekv-server.exe found"
            Get-Item "simplekv-app/target/simplekv-server.exe" | Select-Object Length
          } else {
            Write-Host "ERROR: simplekv-server.exe NOT found"
            exit 1
          }

      - name: Upload CLI executable
        uses: actions/upload-artifact@v4
        with:
          name: simplekv-cli-windows
          path: simplekv-app/target/simplekv-cli.exe
          if-no-files-found: error

      - name: Upload Server executable
        uses: actions/upload-artifact@v4
        with:
          name: simplekv-server-windows
          path: simplekv-app/target/simplekv-server.exe
          if-no-files-found: error

  integration-tests:
    runs-on: windows-latest
    needs: native-build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Configure Maven toolchain
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/toolchains.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>25</version>
              </provides>
              <configuration>
                <jdkHome>${JAVA_HOME}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          EOF

      - name: Download server executable
        uses: actions/download-artifact@v4
        with:
          name: simplekv-server-windows
          path: simplekv-app/target/

      - name: Start SimpleKV server
        shell: powershell
        run: |
          Write-Host "Starting SimpleKV server..."
          $serverProcess = Start-Process -FilePath ".\simplekv-app\target\simplekv-server.exe" `
          -ArgumentList "--port=7379" `
          -PassThru -NoNewWindow `
          -RedirectStandardOutput "server.log" `
          -RedirectStandardError "server-error.log"
          Write-Host "Server process started with PID: $($serverProcess.Id)"
          Start-Sleep -Seconds 5

      - name: Wait for server to be ready
        id: wait_server
        shell: powershell
        continue-on-error: true
        run: |
          $maxRetries = 10
          $retryCount = 0
          $ready = $false
          
          while ($retryCount -lt $maxRetries) {
            try {
              $socket = New-Object System.Net.Sockets.TcpClient
              $socket.Connect("127.0.0.1", 7379)
              $socket.Close()
              Write-Host "OK: Server is ready"
              $ready = $true
              break
            } catch {
              $retryCount++
              Start-Sleep -Seconds 2
            }
          }
          
          if ($ready) {
            echo "server_ready=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "server_ready=false" >> $env:GITHUB_OUTPUT
            Write-Host "WARNING: Server not ready, will skip tests"
          }

      - name: Run integration tests
        if: steps.wait_server.outputs.server_ready == 'true'
        run: mvn -B -ntp -pl simplekv-client -am test

      - name: Skip integration tests notice
        if: steps.wait_server.outputs.server_ready != 'true'
        run: echo "Integration tests skipped because server not ready"

      - name: Stop server
        shell: powershell
        if: always()
        run: |
          Get-Process simplekv-server -ErrorAction SilentlyContinue | Stop-Process -Force
          Write-Host "Server stopped"

      - name: Print server logs
        shell: powershell
        if: always()
        run: |
          if (Test-Path "server.log") {
            Write-Host "=== Server Output ==="
            Get-Content "server.log"
          }
          if (Test-Path "server-error.log") {
            Write-Host "=== Server Error ==="
            Get-Content "server-error.log"
          }

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration
          path: simplekv-client/target/surefire-reports/

  build-summary:
    runs-on: ubuntu-latest
    needs: [jvm-build, native-build-windows, integration-tests]
    if: always()
    steps:
      - name: Check build status
        shell: bash
        run: |
          JVM_STATUS="${{ needs.jvm-build.result }}"
          NATIVE_STATUS="${{ needs.native-build-windows.result }}"
          INTEGRATION_STATUS="${{ needs.integration-tests.result }}"
          
          {
            echo "## Build Summary"
            echo ""
            if [ "$JVM_STATUS" = "success" ]; then
              echo "- JVM Build: PASSED"
            else
              echo "- JVM Build: FAILED"
            fi
            
            if [ "$NATIVE_STATUS" = "success" ]; then
              echo "- Native Build (Windows): PASSED"
            else
              echo "- Native Build (Windows): FAILED"
            fi
            
            if [ "$INTEGRATION_STATUS" = "success" ]; then
              echo "- Integration Tests: PASSED"
            else
              echo "- Integration Tests: FAILED"
            fi
            
            echo ""
            if [ "$JVM_STATUS" != "success" ] || [ "$NATIVE_STATUS" != "success" ] || [ "$INTEGRATION_STATUS" != "success" ]; then
              echo "**Overall Status: FAILED**"
            else
              echo "**Overall Status: SUCCESS**"
            fi
          } >> $GITHUB_STEP_SUMMARY
          
          if [ "$JVM_STATUS" != "success" ] || [ "$NATIVE_STATUS" != "success" ] || [ "$INTEGRATION_STATUS" != "success" ]; then
            exit 1
          fi

  release-artifacts:
    runs-on: ubuntu-latest
    needs: [jvm-build, native-build-windows, integration-tests]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && needs.jvm-build.result == 'success' && needs.native-build-windows.result == 'success' && needs.integration-tests.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p release
          cp artifacts/simplekv-cli-windows/* release/ 2>/dev/null || true
          cp artifacts/simplekv-server-windows/* release/ 2>/dev/null || true
          ls -lah release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: SimpleKV ${{ github.ref_name }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}